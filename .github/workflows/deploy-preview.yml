name: Deploy Preview

on:
  push:
    branches:
      - "feature/**"
      - "feat/**"
      - "refactor/**"
      - "renovate/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment:
      name: preview

    steps:
      - uses: actions/checkout@v6

      - name: Get branch name
        id: branch
        run: |
          # Extract branch name and sanitize it for preview alias
          BRANCH_NAME="${GITHUB_REF#refs/heads/}"
          # Remove prefix before first / (e.g., feature/, renovate/, bugfix/)
          BRANCH_NAME=${BRANCH_NAME#*/}
          # Replace / with -, convert to lowercase, and truncate to 42 characters
          # (63 char limit - 16 for "app-boilerplate" - 1 for "-")
          SANITIZED_BRANCH=$(echo "$BRANCH_NAME" | sed 's/\//-/g' | tr '[:upper:]' '[:lower:]' | cut -c 1-47)
          echo "sanitized=$SANITIZED_BRANCH" >> $GITHUB_OUTPUT

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "latest"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun dotenvx run -f .env.dev -- bun run build
        env:
          DOTENV_PRIVATE_KEY_DEV: ${{ secrets.DOTENV_PRIVATE_KEY_DEV }}

      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: versions upload --preview-alias ${{ steps.branch.outputs.sanitized }}
